spring.application.name=banquito-switch-billing-service
server.port=${SERVER_PORT:8084}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/switch_billing_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init/001_create_billing_tables.sql

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

rabbit.exchange.billing=${RABBIT_EXCHANGE_BILLING:switch.billing.exchange}
rabbit.exchange.reporting=${RABBIT_EXCHANGE_REPORTING:switch.reporting.exchange}
rabbit.queue.billing.batch-completed=${RABBIT_QUEUE_BILLING_BATCH_COMPLETED:switch.billing.batch-completed.queue}
rabbit.queue.reporting.billing-completed=${RABBIT_QUEUE_REPORTING_BILLING_COMPLETED:switch.reporting.billing-completed.queue}
rabbit.routing-key.batch-lines-completed=${RABBIT_ROUTING_KEY_BATCH_LINES_COMPLETED:batch.lines.completed}
rabbit.routing-key.billing-completed=${RABBIT_ROUTING_KEY_BILLING_COMPLETED:billing.completed}

switch.billing.unit-fee=${SWITCH_BILLING_UNIT_FEE:0.40}
switch.billing.fallback-company-ruc=${SWITCH_BILLING_FALLBACK_COMPANY_RUC:1790012345001}
switch.billing.fallback-source-account-number=${SWITCH_BILLING_FALLBACK_SOURCE_ACCOUNT_NUMBER:2200012345}

core.grpc.host=${CORE_GRPC_HOST:localhost}
core.grpc.port=${CORE_GRPC_PORT:9090}
core.grpc.deadline-ms=${CORE_GRPC_DEADLINE_MS:60000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
